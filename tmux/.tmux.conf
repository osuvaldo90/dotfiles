# Pass OSC 52 clipboard sequences through to the outer terminal (macOS).
# Requires tmux >= 3.3. This lets Neovim's OSC 52 provider reach the macOS
# clipboard when connected over SSH.
set -g allow-passthrough on

# Also enable tmux's own clipboard awareness so it knows terminals support it.
set -g set-clipboard on

# Forward focus-in/focus-out events to applications inside tmux so that
# Neovim's FocusGained/FocusLost autocommands fire correctly.
set -g focus-events on

# Let tmux send the current command as the terminal title.
# In iTerm2 tmux integration (-CC mode), this drives the native tab title.
# The OS window title is controlled by the iTerm2 profile, not this setting.
set -g set-titles on
set -g set-titles-string "#{pane_current_command}"

# Auto-rename tmux windows to the foreground process name.
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# Disable tmux's full mouse support (clicks, selection, pane resize, etc.)
set -g mouse off

# Capture only scroll wheel to scroll in copy-mode
bind -n WheelUpPane   if -F "#{pane_in_mode}" "send -M" "copy-mode -e; send -M"
bind -n WheelDownPane if -F "#{pane_in_mode}" "send -M" "send -M"

